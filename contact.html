  <script>

function toggle(element) {
    // আইকনের মেইন বক্সটিকে (প্যারেন্ট) ধরে active ক্লাস বসাবে বা কাটবে
    element.parentElement.classList.toggle('active');
}

  <script>
      document.addEventListener("DOMContentLoaded", function () {
    // ১. বর্তমানে ব্রাউজারে কোন পেজটি ওপেন আছে তার নাম বের করা (যেমন: contact.html)
    const currentPath = decodeURIComponent(window.location.pathname).split("/").pop();

    // ২. নেভিগেশন বারের সবকটি বাটনকে খুঁজে নেওয়া
    const navItems = document.querySelectorAll('.nav-item');

    navItems.forEach(item => {
        // ৩. প্রতিটি বাটনের ভেতরের href লিংকটি নেওয়া (যেমন: resume.html)
        const itemHref = item.getAttribute('href');

        // ৪. কারেন্ট পেজের নামের সাথে যদি বাটনের লিংক মিলে যায়, তবে সেটি হাইলাইট (active) হবে
        if (currentPath === itemHref || (currentPath === "" && itemHref === "index.html")) {
            item.classList.add('active');
        } else {
            // বাকি বাটনগুলো নরমাল থাকবে
            item.classList.remove('active');
        }
    });
});

  </script>
  
  
  <script>
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particlesArray = [];
    const numberOfParticles = 85; // স্ক্রিনে ডটের সংখ্যা (কম-বেশি করতে পারেন)

    window.addEventListener('resize', function() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 1;
            this.speedX = (Math.random() - 0.5) * 0.8;
            this.speedY = (Math.random() - 0.5) * 0.8;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.x > canvas.width || this.x < 0) this.speedX = -this.speedX;
            if (this.y > canvas.height || this.y < 0) this.speedY = -this.speedY;
        }
        draw() {
            ctx.fillStyle = 'rgba(147, 51, 234, 0.8)'; // ডটের কালার (পার্পল)
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function init() {
        for (let i = 0; i < numberOfParticles; i++) {
            particlesArray.push(new Particle());
        }
    }

    function connectParticles() {
        let opacityValue = 1;
        for (let a = 0; a < particlesArray.length; a++) {
            for (let b = a; b < particlesArray.length; b++) {
                let distance = Math.hypot(particlesArray[a].x - particlesArray[b].x, particlesArray[a].y - particlesArray[b].y);
                if (distance < 120) {
                    opacityValue = 1 - (distance / 120);
                    ctx.strokeStyle = `rgba(139, 92, 246, ${opacityValue * 0.25})`; // লাইনের কালার
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                    ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                    ctx.stroke();
                }
            }
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < particlesArray.length; i++) {
            particlesArray[i].update();
            particlesArray[i].draw();
        }
        connectParticles();
        requestAnimationFrame(animate);
    }

    init();
    animate();
</script>
