<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="portfolio.css">
  <title>My Portfolio</title>
</head>

<body>
     <!-- আইকন লাইব্রেরি (এটি না থাকলে আইকন দেখা যাবে না) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> 

  <nav>
    <div class="nav-page">
      <a href="index.html" class="nav-item">
        <div class="icon-wrapper"><i class="fas fa-home"></i></div>
        <span class="nav-label">Home</span>
      </a>
      
      <a href="my profile.html"  class="nav-item">
        <div class="icon-wrapper"><i class="fas fa-user"></i></div>
        <span class="nav-label">My Profile</span>
      </a>
      
      <a href="portfolio.html" class="nav-item">
        <div class="icon-wrapper"><i class="fas fa-briefcase"></i></div>
        <span class="nav-label">Portpholio</span>
      </a>
      
      <a href="contact.html" class="nav-item">
        <div class="icon-wrapper"><i class="fas fa-envelope"></i></div>
        <span class="nav-label">Contact</span>
      </a>
      
      
    </div>
  </nav>

  <main>
    
    
    
    
  </main>
  
  
  <script>
    
    document.addEventListener("DOMContentLoaded", function () {
    // ১. বর্তমানে ব্রাউজারে কোন পেজটি ওপেন আছে তার নাম বের করা (যেমন: contact.html)
    const currentPath = decodeURIComponent(window.location.pathname).split("/").pop();

    // ২. নেভিগেশন বারের সবকটি বাটনকে খুঁজে নেওয়া
    const navItems = document.querySelectorAll('.nav-item');

    navItems.forEach(item => {
        // ৩. প্রতিটি বাটনের ভেতরের href লিংকটি নেওয়া (যেমন: resume.html)
        const itemHref = item.getAttribute('href');

        // ৪. কারেন্ট পেজের নামের সাথে যদি বাটনের লিংক মিলে যায়, তবে সেটি হাইলাইট (active) হবে
        if (currentPath === itemHref || (currentPath === "" && itemHref === "index.html")) {
            item.classList.add('active');
        } else {
            // বাকি বাটনগুলো নরমাল থাকবে
            item.classList.remove('active');
        }
    });
});

  </script>
</body>

</html>
